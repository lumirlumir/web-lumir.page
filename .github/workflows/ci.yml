name: ci

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'main') }}

env:
  HUSKY: 0 # Skip Husky during CI: https://typicode.github.io/husky/how-to.html#ci-server-and-docker

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Set up checkout
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm # https://github.com/actions/setup-node#caching-global-packages-data

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build:pkg

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Set up checkout
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm # https://github.com/actions/setup-node#caching-global-packages-data

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install playwright browsers
        run: npx playwright install chromium --with-deps --only-shell

      - name: Build
        run: npm run build:pkg

      - name: Pack test
        run: npm run pack:pkg

      - name: Unit and browser test
        run: npm run test
